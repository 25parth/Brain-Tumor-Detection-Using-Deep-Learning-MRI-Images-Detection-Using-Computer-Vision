<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumor Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="display-4 fw-bold text-olive-dark">MRI Tumor Detection System</h1>
            <p class="lead text-olive-muted">Upload an MRI image to detect if there is a tumor and its type.</p>
        </div>

        <div class="card shadow-sm p-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-4">
                    <label for="file" class="form-label">Select MRI Image:</label>
                    <input type="file" class="form-control" id="file" name="file" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-olive w-100">Upload and Detect</button>
            </form>
        </div>

        {% if result %}
        <div id="results" class="mt-4">
            <div class="card shadow-sm border-olive-success">
                <div class="card-body">
                    <h4 class="card-title fw-bold text-olive-dark">{{ result }}</h4>
                    <p class="card-text text-muted">Confidence: <span class="fw-bold">{{ confidence }}%</span></p>
                    <img src="{{ file_path }}" class="img-fluid rounded w-100" alt="Uploaded Image">
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
